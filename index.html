<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⭐️ El Principito — Un Susurro Entre las Estrellas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,500;1,600&family=EB+Garamond:ital@1&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --night-deep:#070a18;
    --night-mid:#0d1530;
    --night-blue:#16234a;
    --star-gold:#f4d27a;
    --rose-crimson:#c8273c;
    --easypagex-gold:#e8b840;
    --easypagex-lime:#9bd732;
    --cream:#f4ecd8;
  }

  *{box-sizing:border-box;}

  html,body{
    margin:0;
    padding:0;
    background:var(--night-deep);
    color:var(--cream);
    font-family:'Quicksand', sans-serif;
    overflow-x:hidden;
    min-height:100%;
  }

  body{
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(244,210,122,0.06), transparent 60%),
      linear-gradient(180deg, #050712 0%, #0a1128 40%, #101c3f 100%);
    position:relative;
  }

  /* ambient starfield behind everything */
  #ambientStars{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
  }
  #ambientStars span{
    position:absolute;
    width:2px;
    height:2px;
    background:#fff;
    border-radius:50%;
    opacity:0.6;
    animation:twinkle 3.5s ease-in-out infinite;
  }
  @keyframes twinkle{
    0%,100%{opacity:0.15; transform:scale(1);}
    50%{opacity:0.95; transform:scale(1.6);}
  }

  header{
    text-align:center;
    padding:38px 20px 8px;
    position:relative;
    z-index:2;
  }
  .eyebrow{
    font-size:0.72rem;
    letter-spacing:0.28em;
    text-transform:uppercase;
    color:var(--star-gold);
    opacity:0.75;
    margin:0 0 10px;
  }
  h1{
    font-family:'Cormorant Garamond', serif;
    font-weight:500;
    font-size:clamp(1.8rem, 5vw, 2.8rem);
    margin:0;
    letter-spacing:0.01em;
    color:var(--cream);
    text-shadow:0 0 24px rgba(244,210,122,0.25);
  }
  h1 em{
    font-style:italic;
    color:var(--star-gold);
  }
  .sub{
    font-family:'EB Garamond', serif;
    font-style:italic;
    color:#a9b4d6;
    font-size:0.95rem;
    margin-top:10px;
    opacity:0.85;
  }

  main{
    position:relative;
    z-index:2;
    width:min(420px, 92vw);
    margin:18px auto 10px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  /* the stage holding bubble + image */
  .stage{
    position:relative;
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  .speech-bubble{
    position:relative;
    width:min(380px, 90vw);
    margin:0 auto 18px;
    background:linear-gradient(160deg, rgba(20,28,56,0.96), rgba(10,16,34,0.97));
    border:1px solid rgba(244,210,122,0.45);
    border-radius:20px;
    padding:20px 24px 18px;
    box-shadow:0 12px 40px rgba(0,0,0,0.55), 0 0 30px rgba(244,210,122,0.08);
    opacity:0;
    visibility:hidden;
    transform:scale(0.92);
    transition:opacity 0.5s ease, transform 0.5s ease, visibility 0.5s ease;
    z-index:5;
  }
  .speech-bubble.show{
    opacity:1;
    visibility:visible;
    transform:scale(1);
  }
  .speech-bubble::after{
    content:"";
    position:absolute;
    bottom:-11px;
    left:50%;
    transform:translateX(-50%);
    width:22px;
    height:22px;
    background:inherit;
    border-right:1px solid rgba(244,210,122,0.45);
    border-bottom:1px solid rgba(244,210,122,0.45);
    clip-path:polygon(0 0, 100% 0, 50% 100%);
    border-radius:0 0 4px 0;
  }
  .speech-bubble p{
    margin:0;
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-weight:500;
    font-size:1.35rem;
    line-height:1.55;
    color:var(--cream);
    text-align:center;
  }
  .speech-bubble .quote-mark{
    color:var(--star-gold);
    font-family:'Cormorant Garamond', serif;
    font-size:1.7rem;
    opacity:0.8;
  }

  .frame{
    position:relative;
    width:100%;
    border-radius:22px;
    overflow:hidden;
    cursor:pointer;
    box-shadow:0 18px 50px rgba(0,0,0,0.6), 0 0 0 1px rgba(244,210,122,0.18);
    transition:transform 0.35s ease, box-shadow 0.35s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .frame:hover{
    transform:translateY(-3px);
    box-shadow:0 22px 60px rgba(0,0,0,0.65), 0 0 0 1px rgba(244,210,122,0.35);
  }
  .frame img{
    display:block;
    width:100%;
    height:auto;
    user-select:none;
    -webkit-user-drag:none;
  }
  .frame.ringing img{
    animation:ringPulse 0.6s ease;
  }
  @keyframes ringPulse{
    0%{filter:brightness(1);}
    25%{filter:brightness(1.18);}
    100%{filter:brightness(1);}
  }

  /* chime ripple rings when triggered */
  .ripple{
    position:absolute;
    border:1.5px solid rgba(244,210,122,0.8);
    border-radius:50%;
    top:50%;
    left:50%;
    width:10px;
    height:10px;
    transform:translate(-50%,-50%);
    opacity:0;
    pointer-events:none;
    z-index:4;
  }
  .ripple.go{
    animation:rippleOut 1.1s ease-out;
  }
  @keyframes rippleOut{
    0%{opacity:0.9; width:10px; height:10px;}
    100%{opacity:0; width:380px; height:380px;}
  }

  .tap-hint{
    margin-top:14px;
    font-size:0.78rem;
    letter-spacing:0.04em;
    color:#8d97bd;
    font-family:'Quicksand', sans-serif;
    opacity:0.8;
    text-align:center;
  }
  .tap-hint svg{
    vertical-align:-3px;
    margin-right:5px;
  }

  footer{
    position:relative;
    z-index:2;
    margin:30px auto 50px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
  }

  .cta-btn{
    display:inline-flex;
    align-items:center;
    gap:10px;
    text-decoration:none;
    padding:14px 30px;
    border-radius:999px;
    font-family:'Quicksand', sans-serif;
    font-weight:700;
    font-size:0.95rem;
    letter-spacing:0.03em;
    color:#fff;
    background:linear-gradient(120deg, var(--rose-crimson), #8f1726);
    border:1px solid var(--easypagex-gold);
    box-shadow:0 8px 24px rgba(200,39,60,0.35);
    transition:transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
  }
  .cta-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 30px rgba(200,39,60,0.5), 0 0 0 2px var(--easypagex-lime);
  }
  .cta-btn .dot{
    width:7px;
    height:7px;
    border-radius:50%;
    background:var(--easypagex-lime);
    box-shadow:0 0 8px var(--easypagex-lime);
  }
  .footer-note{
    font-size:0.7rem;
    color:#5d6890;
    letter-spacing:0.02em;
  }

  @media (prefers-reduced-motion: reduce){
    .speech-bubble, .frame, .frame img, .ripple, #ambientStars span{
      animation:none !important;
      transition:opacity 0.3s ease !important;
    }
  }
</style>
</head>

  const QUOTES = [
    "Lo esencial es invisible a los ojos; solo con el corazón se puede ver bien.",
    "Te vuelves responsable, para siempre, de lo que has domesticado.",
    "Es el tiempo que has perdido por tu rosa lo que hace tu rosa tan importante.",
    "Todos los adultos fueron niños alguna vez... pero pocos lo recuerdan.",
    "A los adultos les encantan las cifras... Cuando les dices que has hecho un nuevo amigo, nunca te preguntan nada esencial sobre él.",
    "Los hombres ya no tienen tiempo para entender nada. Compran cosas hechas en las tiendas. Pero como no existe ninguna tienda donde se vendan amigos, los hombres ya no tienen amigos.",
    "Es mucho más difícil juzgarse a sí mismo que juzgar a los demás. Si logras juzgarte bien, es que eres un verdadero sabio.",
    "Lo que hace bello al desierto es que en algún lugar esconde un pozo...",
    "Hay que aserrar unas cuantas orugas si se quiere conocer a las mariposas."
  ];

  let quoteIndex = -1;
  let showingImage2 = false;
  const bubble = document.getElementById('bubble');
  const quoteText = document.getElementById('quoteText');
  const frame = document.getElementById('frame');
  const ripple = document.getElementById('ripple');
  const princeImg = document.getElementById('princeImg');

  function nextQuote(){
    quoteIndex = (quoteIndex + 1) % QUOTES.length;
    return QUOTES[quoteIndex];
  }

  function toggleImage(){
    showingImage2 = !showingImage2;
    princeImg.src = showingImage2 ? IMAGE_2 : IMAGE_1;
  }

  let hideTimer = null;

  function speak(){
    quoteText.textContent = nextQuote();
    bubble.classList.add('show');
    playBell();
    toggleImage();
    frame.classList.remove('ringing');
    // restart animation
    requestAnimationFrame(()=> frame.classList.add('ringing'));
    ripple.classList.remove('go');
    requestAnimationFrame(()=> ripple.classList.add('go'));

    if(hideTimer) clearTimeout(hideTimer);
    hideTimer = setTimeout(()=>{
      bubble.classList.remove('show');
    }, 6200);
  }

  // ---------- bell sound via Web Audio API ----------
  let audioCtx = null;
  function getCtx(){
    if(!audioCtx){
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if(audioCtx.state === 'suspended'){
      audioCtx.resume();
    }
    return audioCtx;
  }

  function playBell(){
    try{
      const ctx = getCtx();
      const now = ctx.currentTime;

      const master = ctx.createGain();
      master.gain.value = 0.85;
      master.connect(ctx.destination);

      // --- the "strike": a short burst of filtered noise, like metal being tapped ---
      const noiseDur = 0.05;
      const bufferSize = Math.max(1, Math.floor(ctx.sampleRate * noiseDur));
      const noiseBuffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
      const data = noiseBuffer.getChannelData(0);
      for(let i=0;i<bufferSize;i++){
        data[i] = (Math.random()*2-1) * (1 - i/bufferSize);
      }
      const noise = ctx.createBufferSource();
      noise.buffer = noiseBuffer;
      const noiseFilter = ctx.createBiquadFilter();
      noiseFilter.type = 'bandpass';
      noiseFilter.frequency.value = 4200;
      noiseFilter.Q.value = 1.1;
      const noiseGain = ctx.createGain();
      noiseGain.gain.setValueAtTime(0.4, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + noiseDur);
      noise.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(master);
      noise.start(now);
      noise.stop(now + noiseDur);

      // --- the bell body: real bells ring with INHARMONIC overtones, not clean multiples ---
      // ratios approximate the hum/fundamental/tierce/quint/nominal series of a small bell
      const fundamental = 1500;
      const partials = [
        { ratio: 0.5,  gain: 0.16, decay: 1.7, detune: 1.5 },  // hum tone
        { ratio: 1.0,  gain: 0.55, decay: 1.35, decay2: null, detune: 2.5 }, // strike note
        { ratio: 1.19, gain: 0.30, decay: 1.05, detune: 3.5 }, // minor-third partial (tierce)
        { ratio: 1.50, gain: 0.22, decay: 0.85, detune: 2.5 }, // quint
        { ratio: 2.02, gain: 0.18, decay: 0.65, detune: 4   }, // octave nominal
        { ratio: 2.66, gain: 0.11, decay: 0.45, detune: 5   }, // upper partial
        { ratio: 3.40, gain: 0.06, decay: 0.30, detune: 6   }  // bright shimmer
      ];

      partials.forEach(p =>{
        // two slightly detuned oscillators per partial create the natural "beating" shimmer of real bells
        [-1, 1].forEach(sign =>{
          const osc = ctx.createOscillator();
          osc.type = 'sine';
          osc.frequency.value = fundamental * p.ratio;
          osc.detune.value = p.detune * sign;

          const gain = ctx.createGain();
          const peak = p.gain * 0.5;
          gain.gain.setValueAtTime(0, now);
          gain.gain.linearRampToValueAtTime(peak, now + 0.005);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + p.decay);

          osc.connect(gain);
          gain.connect(master);

          osc.start(now);
          osc.stop(now + p.decay + 0.05);
        });
      });
    }catch(e){
      // Web Audio not available — fail silently
      console.warn('Bell sound unavailable:', e);
    }
  }

  // ---------- interactions ----------
  frame.addEventListener('click', speak);
  frame.addEventListener('keydown', (e)=>{
    if(e.key === 'Enter' || e.key === ' '){
      e.preventDefault();
      speak();
    }
  });

  // first automatic speak shortly after load, then every 8 seconds
  setTimeout(speak, 1400);
  setInterval(speak, 8000);
})();
